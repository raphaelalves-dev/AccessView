name: Sugerir melhoria
description: Proponha uma funcionalidade ou melhoria de usabilidade.
title: "[Melhoria] "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problema ou oportunidade
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Solução proposta
    validations:
      required: true
  - type: textarea
    id: impact
    attributes:
      label: Impacto esperado
